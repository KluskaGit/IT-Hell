<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
</div>

<div class="auth-wrapper animate-fadeIn">
  <div class="auth-header">
    <a routerLink="/" class="logo-link">
      <div class="logo-icon"></div>
      <span class="logo-text">CV<span class="logo-accent">_ANALIZER</span></span>
    </a>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h2>Zresetuj hasło</h2>
      <p>Podaj e-mail, na który założono konto. Wyślemy Ci link do zmiany hasła.</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group" style="margin-bottom: 1rem;">
        <label for="email">Adres e-mail</label>
        <input type="email" id="email" formControlName="email" placeholder="Wpisz swój e-mail">
      </div>

      <button type="submit" class="submit-button">Wyślij link resetujący</button>
    </form>

    <div class="card-footer">
      Przypomniałeś sobie hasło? <a routerLink="/login" class="register-link">Zaloguj się</a>
    </div>
  </div>
</div>
