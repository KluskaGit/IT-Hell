<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
</div>

<div class="auth-wrapper animate-fadeIn">
  
  <div class="auth-header">
    <a routerLink="/" class="logo-link">
      <div class="logo-icon"></div>
      <span class="logo-text">CV<span class="logo-accent">_ANALIZER</span></span>
    </a>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h2>Zaloguj się</h2>
      <p>Wybierz preferowaną metodę logowania</p>
    </div>

    <div class="social-login-group">
      <button type="button" class="social-btn btn-social" (click)="loginWithSocial('Google')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google" width="20" height="20">
        Zaloguj się przez Google
      </button>
      <button type="button" class="social-btn btn-social" (click)="loginWithSocial('GitHub')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" alt="GitHub" width="20" height="20">
        Zaloguj się przez GitHub
      </button>
      <button type="button" class="social-btn btn-social" (click)="loginWithSocial('LinkedIn')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linkedin/linkedin-original.svg" alt="LinkedIn" width="20" height="20">
        Zaloguj się przez LinkedIn
      </button>
    </div>

    <div class="divider">
      <span>LUB UŻYJ E-MAILA</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group">
        <label for="email">Adres e-mail</label>
        <input type="email" id="email" formControlName="email" placeholder="Wpisz swój e-mail">
      </div>

      <div class="input-group">
        <div class="label-row">
          <label for="password">Hasło</label>
          <a routerLink="/forgot-password" class="forgot-password">Zapomniałeś hasła?</a>
        </div>
        <input type="password" id="password" formControlName="password" placeholder="Wpisz hasło">
      </div>

      <button type="submit" class="submit-button">
        Zaloguj się
      </button>
    </form>

    <div class="card-footer">
      Nie masz jeszcze konta? 
      <a routerLink="/register" class="register-link">Zarejestruj się</a>
    </div>

  </div>
</div>
