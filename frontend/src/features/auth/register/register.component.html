<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
</div>

<div class="auth-wrapper animate-fadeIn">
  <div class="auth-header">
    <a routerLink="/" class="logo-link">
      <div class="logo-icon"></div>
      <span class="logo-text">CV<span class="logo-accent">_ANALIZER</span></span>
    </a>
  </div>

  <div class="auth-card">
    <div class="card-header">
      <h2>Załóż konto</h2>
      <p>Dołącz i znajdź idealne oferty IT</p>
    </div>

    <div class="social-login-group">
      <button type="button" class="social-btn btn-social" (click)="registerWithSocial('Google')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/google/google-original.svg" alt="Google" width="20" height="20">
        Rejestracja przez Google
      </button>
      <button type="button" class="social-btn btn-social" (click)="registerWithSocial('GitHub')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" alt="GitHub" width="20" height="20">
        Rejestracja przez GitHub
      </button>
      <button type="button" class="social-btn btn-social" (click)="registerWithSocial('LinkedIn')">
        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/linkedin/linkedin-original.svg" alt="LinkedIn" width="20" height="20">
        Rejestracja przez LinkedIn
      </button>
    </div>

    <div class="divider"><span>LUB UŻYJ E-MAILA</span></div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="input-group">
        <label for="email">Adres e-mail</label>
        <input type="email" id="email" formControlName="email" placeholder="Wpisz swój e-mail">
      </div>

      <div class="input-group">
        <label for="password">Hasło</label>
        <input type="password" id="password" formControlName="password" placeholder="Minimum 6 znaków">
      </div>

      <div class="input-group">
        <label for="confirmPassword">Powtórz hasło</label>
        <input type="password" id="confirmPassword" formControlName="confirmPassword" placeholder="Powtórz hasło">
      </div>

      <button type="submit" class="submit-button">Zarejestruj się</button>
    </form>

    <div class="card-footer">
      Masz już konto? <a routerLink="/login" class="register-link">Zaloguj się</a>
    </div>
  </div>
</div>
