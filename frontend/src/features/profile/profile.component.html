<app-navbar></app-navbar>

<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
</div>

<div class="profile-wrapper">
  <div class="profile-grid">

    <!-- ══ LEWA KOLUMNA: dane użytkownika + akcje ══ -->
    <aside class="profile-left">

      <section class="glass-card hero-card animate-up">
        <div class="hero-layout">
          <div class="avatar-container">
            <div class="avatar">
              <svg viewBox="0 0 24 24" width="44" height="44" stroke="currentColor" stroke-width="1.3" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
          </div>

          <div class="hero-identity">
            <span class="hero-display-name">
              {{ profileForm.get('firstName')?.value }} {{ profileForm.get('lastName')?.value }}
            </span>
            <span class="hero-display-email">{{ email }}</span>
          </div>

          <div class="hero-info" [formGroup]="profileForm">
            <div class="form-row">
              <div class="input-group">
                <label>Imię</label>
                <input formControlName="firstName" readonly class="input-readonly">
              </div>
              <div class="input-group">
                <label>Nazwisko</label>
                <input formControlName="lastName" readonly class="input-readonly">
              </div>
            </div>
            <div class="input-group">
              <label>E-mail</label>
              <input [value]="email" readonly class="input-readonly">
            </div>
          </div>
        </div>
      </section>

      <!-- Alerty -->
      <div class="alert alert-error animate-up" *ngIf="loadError">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ loadError }}
      </div>
      <div class="alert alert-error animate-up" *ngIf="saveError">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ saveError }}
      </div>
      <div class="alert alert-success animate-up" *ngIf="saveSuccess">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        {{ saveSuccess }}
      </div>

      <!-- Przyciski -->
      <div class="actions-col animate-up delay-2">
        <button type="button" class="submit-button" [disabled]="isSaving" (click)="onSave()">
          <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          {{ isSaving ? 'Zapisywanie…' : 'Zapisz zmiany' }}
        </button>
        <a class="secondary-button" routerLink="/">Anuluj</a>
      </div>

    </aside>

    <!-- ══ PRAWA KOLUMNA: preferencje ══ -->
    <div class="profile-right animate-up delay-1">
      <app-filters-form
        [initialFilters]="savedFilters"
        [showApplyButton]="false"
        summaryHeading="Preferencje i umiejętności"
        [showSummaryHeader]="true"
        [showLocation]="false"
        [showWorkMode]="false"
        [showSalary]="false"
        [showRoles]="false"
        [showSites]="false"
        [showExpLevel]="true"
        [showTechnologies]="true"
        [singleExpLevelSelection]="true"
        [showCvUpload]="true"
        (filtersChange)="onFiltersChange($event)">
      </app-filters-form>
    </div>

  </div>
</div>
