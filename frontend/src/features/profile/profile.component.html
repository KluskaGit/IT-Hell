<nav class="navbar">
  <div class="nav-container">
    <a routerLink="/" class="logo">
      <div class="logo-icon"></div>
      <span>CV<span class="logo-accent">_ANALIZER</span></span>
    </a>
    <div class="nav-links">
      <a routerLink="/">Strona główna</a>
      <a routerLink="/profile" class="nav-active">Mój profil</a>
    </div>
    <button type="button" class="btn-danger" (click)="onLogout()">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Wyloguj
    </button>
  </div>
</nav>

<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
</div>

<div class="profile-container">

  <section class="glass-card hero-card animate-up">
    <div class="hero-layout">
      <div class="avatar-container">
        <div class="avatar">
          <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <button type="button" class="avatar-edit-btn" title="Zmień zdjęcie">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>

      <div class="hero-info" [formGroup]="profileForm">
        <div class="form-row">
          <div class="input-group">
            <label>Imię</label>
            <input formControlName="firstName" placeholder="Twoje imię">
          </div>
          <div class="input-group">
            <label>Nazwisko</label>
            <input formControlName="lastName" placeholder="Twoje nazwisko">
          </div>
        </div>
        <div class="input-group">
          <label>E-mail</label>
          <input [value]="email" readonly class="input-readonly">
        </div>
      </div>
    </div>
  </section>

  <div class="main-card animate-up delay-1">

    <div class="upload-area" *ngIf="!scanComplete">
      <ng-container *ngIf="!isScanning">
        <input type="file" #fileInput hidden accept=".pdf,.doc,.docx" (change)="onFileSelected($event)">
        <button
          type="button"
          class="dropzone"
          [class.dragging]="isDragging"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)"
          (drop)="onDrop($event)"
          (click)="fileInput.click()">
          <div class="dropzone-inner">
            <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <span>Wgraj CV (PDF, DOC, DOCX) - AI automatycznie uzupełni dane</span>
          </div>
        </button>
      </ng-container>

      <div class="scanner-container" *ngIf="isScanning">
        <div class="radar-box">
          <div class="radar-sweep" [class.radar-done]="scanProgress === 100"></div>
          <svg viewBox="0 0 24 24" width="40" height="40" stroke="#6366f1" stroke-width="1.5" fill="none">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <h3 class="scanning-text">{{ scanStatus }}</h3>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" [style.width.%]="scanProgress"></div>
        </div>
        <p class="progress-percent">{{ scanProgress }}%</p>
      </div>
    </div>

    <div class="scan-success-banner" *ngIf="scanComplete">
      <div class="success-icon">✓</div>
      <div class="success-info">
        <strong>CV przeanalizowane: {{ currentCvFile }}</strong>
        <span>Formularz został automatycznie uzupełniony. Przejrzyj i popraw dane.</span>
      </div>
      <button type="button" class="remove-link" (click)="removeCv()">Usuń CV</button>
    </div>

  </div>

  <app-filters-form
    class="animate-up delay-2"
    [initialFilters]="savedFilters"
    [showApplyButton]="false"
    summaryHeading="Technologie i doświadczenie"
    [showSummaryHeader]="true"
    [showLocation]="false"
    [showWorkMode]="false"
    [showSalary]="false"
    [showRoles]="false"
    [showSites]="false"
    [showExpLevel]="true"
    [showTechnologies]="true"
    [singleExpLevelSelection]="true"
    (filtersChange)="onFiltersChange($event)">
  </app-filters-form>

  <div class="actions-row animate-up delay-3">
    <button type="button" class="submit-button" (click)="onSave()">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Zapisz zmiany
    </button>
    <button type="button" class="secondary-button" routerLink="/">Anuluj</button>
  </div>

</div>
