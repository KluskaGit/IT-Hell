<!-- Nawigacja z logo i przyciskiem logowania Keycloak -->
<app-navbar></app-navbar>

<!-- Dekoracyjne plamy kolorow w tle - CSS gradient blur, bez logiki Angular -->
<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
</div>

<!-- Glowny wrapper strony - wszystkie sekcje profilu wewnatrz -->
<div class="profile-container">

  <!-- Gorna siatka dwoch kart: dane osobowe (lewa) i CV (prawa).
       Na mobile CSS zmienia na jedna kolumne -->
  <div class="profile-top-grid animate-up">

    <!-- Karta "Dane osobowe" - dane z Keycloak tylko do odczytu.
         Wczytywane z tokenu JWT przez initFromToken() bez wywolania API -->
    <section class="glass-card info-card">
      <div class="card-label">Dane osobowe</div>
      <div class="hero-layout">

        <!-- Avatar - statyczny SVG, bez uploadu zdjecia w tej wersji -->
        <div class="avatar-container">
          <div class="avatar">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <!-- Pola tylko do odczytu - imie, nazwisko i email z Keycloak, nie sa edytowalne -->
        <div class="hero-info">
          <div class="form-row">
            <div class="input-group">
              <label>Imię</label>
              <input [value]="firstName" readonly class="input-readonly">
            </div>
            <div class="input-group">
              <label>Nazwisko</label>
              <input [value]="lastName" readonly class="input-readonly">
            </div>
          </div>
          <div class="input-group">
            <label>E-mail</label>
            <input [value]="email" readonly class="input-readonly">
          </div>
        </div>
      </div>
    </section>

    <!-- Karta "Twoje CV" - trzy stany: dropzone, animacja skanowania, baner sukcesu.
         Logika stanow w analyzeCV() i removeCv() w profile.component.ts -->
    <section class="glass-card cv-card">
      <div class="card-label">Twoje CV</div>

      <!-- Obszar uploadu - ukrywany gdy analiza zakonczyla sie sukcesem (scanComplete) -->
      <div class="upload-area" *ngIf="!scanComplete">

        <!-- Dropzone - widoczna gdy brak aktywnego skanowania -->
        <ng-container *ngIf="!isScanning">

          <!-- Ukryty input - technika zastapienia natywnego inputu klikalnym obszarem dropzone nizej -->
          <input type="file" #fileInput hidden accept=".pdf,.doc,.docx" (change)="onFileSelected($event)">

          <!-- Widoczny obszar drag&drop - klikniecie otwiera dialog wyboru pliku przez fileInput.click().
               Klasa .dragging pojawia sie gdy uzytkownik przeciaga plik nad obszar (isDragging) -->
          <button
            type="button"
            class="dropzone"
            [class.dragging]="isDragging"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            (click)="fileInput.click()">
            <div class="dropzone-inner">
              <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              <span>Wgraj CV (PDF, DOC, DOCX)</span>
            </div>
          </button>
        </ng-container>

        <!-- Animacja skanowania - widoczna gdy isScanning = true (plik wyslany do API).
             Pasek postepu symulowany przez setTimeout - API nie zwraca postepu w czasie rzeczywistym -->
        <div class="scanner-container" *ngIf="isScanning">
          <div class="radar-box">
            <!-- radar-done zatrzymuje animacje radaru gdy skanowanie sie konczy (scanProgress === 100) -->
            <div class="radar-sweep" [class.radar-done]="scanProgress === 100"></div>
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="#6366f1" stroke-width="1.5" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>

          <!-- Tekst statusu aktualizowany etapami przez analyzeCV() -->
          <h3 class="scanning-text">{{ scanStatus }}</h3>

          <!-- Pasek postepu - szerokosc sterowana przez scanProgress (0-100) -->
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" [style.width.%]="scanProgress"></div>
          </div>
          <p class="progress-percent">{{ scanProgress }}%</p>
        </div>
      </div>

      <!-- Baner sukcesu - widoczny gdy analiza CV sie powiodla (scanComplete = true).
           Przycisk "Usun" wywoluje removeCv() ktory resetuje stan i ponownie pokazuje dropzone -->
      <div class="scan-success-banner" *ngIf="scanComplete">
        <div class="success-icon">✓</div>
        <div class="success-info">
          <strong>{{ currentCvFile }}</strong>
          <span>CV przeanalizowane pomyślnie</span>
        </div>
        <button type="button" class="remove-link" (click)="removeCv()">Usuń</button>
      </div>

    </section>

  </div>

  <!-- Formularz filtrow technologii i doswiadczenia - ten sam FiltersFormComponent co na /home i /offers,
       tu skonfigurowany tylko z seniority i technologiami (bez lokalizacji, salary ani rol) -->
  <app-filters-form
    class="animate-up delay-1"
    [initialFilters]="savedFilters"
    [showApplyButton]="false"
    summaryHeading="Technologie i doświadczenie"
    [showSummaryHeader]="true"
    [showLocation]="false"
    [showWorkMode]="false"
    [showSalary]="false"
    [showRoles]="false"
    [showSites]="false"
    [showExpLevel]="true"
    [showTechnologies]="true"
    [singleExpLevelSelection]="true"
    (filtersChange)="onFiltersChange($event)">
  </app-filters-form>

  <!-- Blad ladowania profilu - 404 jest normalnym stanem dla nowego uzytkownika i nie ustawia loadError -->
  <div *ngIf="loadError" class="profile-feedback animate-up">
    <div class="profile-feedback-box error">{{ loadError }}</div>
  </div>

  <!-- Komunikaty po zapisie: saveError (blad PUT) lub saveSuccess (sukces, znika po 3s).
       saveSuccessTimer w profile.component.ts automatycznie kasuje komunikat sukcesu -->
  <div *ngIf="saveError || saveSuccess" class="profile-feedback animate-up">
    <div *ngIf="saveError" class="profile-feedback-box error">{{ saveError }}</div>
    <div *ngIf="saveSuccess" class="profile-feedback-box success">{{ saveSuccess }}</div>
  </div>

  <!-- Przyciski akcji - actions-row-with-feedback zmniejsza margin gdy widoczny jest baner feedback -->
  <div class="actions-row animate-up delay-2" [class.actions-row-with-feedback]="saveError || saveSuccess">

    <!-- Przycisk "Zapisz zmiany" - wysyla PUT /v1/users/me/profile przez onSave().
         Zablokowany podczas trwajacego zapisu (isSaving = true) -->
    <button type="button" class="submit-button" (click)="onSave()" [disabled]="isSaving">
      <ng-container *ngIf="!isSaving">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Zapisz zmiany
      </ng-container>
      <ng-container *ngIf="isSaving">Zapisywanie…</ng-container>
    </button>

    <!-- Anuluj - wraca do strony glownej przez Angular Router bez przeladowania -->
    <button type="button" class="secondary-button" routerLink="/">Anuluj</button>
  </div>

</div>

<!-- Stopka strony -->
<app-footer></app-footer>
