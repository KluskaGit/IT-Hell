<!-- Navigation with the logo and the Keycloak login button -->
<app-navbar></app-navbar>

<!-- Decorative background color blobs - CSS gradient blur, no Angular logic -->
<div class="background-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
</div>

<!-- Main page wrapper - all profile sections inside -->
<div class="profile-container">

  <!-- Top grid of two cards: personal data (left) and CV (right).
       On mobile the CSS switches to a single column -->
  <div class="profile-top-grid animate-up">

    <!-- "Personal data" card - read-only data from Keycloak.
         Loaded from the JWT via initFromToken() without an API call -->
    <section class="glass-card info-card">
      <div class="card-label">Dane osobowe</div>
      <div class="hero-layout">

        <!-- Avatar - a static SVG, no photo upload in this version -->
        <div class="avatar-container">
          <div class="avatar">
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <!-- Read-only fields - first name, last name and email from Keycloak, not editable -->
        <div class="hero-info">
          <div class="form-row">
            <div class="input-group">
              <label>Imię</label>
              <input [value]="firstName" readonly class="input-readonly">
            </div>
            <div class="input-group">
              <label>Nazwisko</label>
              <input [value]="lastName" readonly class="input-readonly">
            </div>
          </div>
          <div class="input-group">
            <label>E-mail</label>
            <input [value]="email" readonly class="input-readonly">
          </div>
        </div>
      </div>
    </section>

    <!-- "Your CV" card - three states: dropzone, scanning animation, success banner.
         State logic in analyzeCV() and removeCv() in profile.component.ts -->
    <section class="glass-card cv-card">
      <div class="card-label">Twoje CV</div>

      <!-- Upload area - hidden once the analysis succeeds (scanComplete) -->
      <div class="upload-area" *ngIf="!scanComplete">

        <!-- Dropzone - visible when no scan is active -->
        <ng-container *ngIf="!isScanning">

          <!-- Hidden input - the native input is replaced by the clickable dropzone area below -->
          <input type="file" #fileInput hidden accept=".pdf,.doc,.docx" (change)="onFileSelected($event)">

          <!-- Visible drag&drop area - clicking opens the file picker via fileInput.click().
               The .dragging class appears while the user drags a file over the area (isDragging) -->
          <button
            type="button"
            class="dropzone"
            [class.dragging]="isDragging"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            (click)="fileInput.click()">
            <div class="dropzone-inner">
              <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="1.5" fill="none">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              <span>Wgraj CV (PDF, DOC, DOCX)</span>
            </div>
          </button>
        </ng-container>

        <!-- Scanning animation - visible when isScanning = true (file sent to the API).
             The progress bar is simulated with setTimeout - the API returns no real-time progress -->
        <div class="scanner-container" *ngIf="isScanning">
          <div class="radar-box">
            <!-- radar-done stops the radar animation when scanning finishes (scanProgress === 100) -->
            <div class="radar-sweep" [class.radar-done]="scanProgress === 100"></div>
            <svg viewBox="0 0 24 24" width="40" height="40" stroke="#6366f1" stroke-width="1.5" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>

          <!-- Status text updated in stages by analyzeCV() -->
          <h3 class="scanning-text">{{ scanStatus }}</h3>

          <!-- Progress bar - width driven by scanProgress (0-100) -->
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" [style.width.%]="scanProgress"></div>
          </div>
          <p class="progress-percent">{{ scanProgress }}%</p>
        </div>
      </div>

      <!-- Success banner - visible when CV analysis succeeded (scanComplete = true).
           The "Remove" button calls removeCv() which resets the state and shows the dropzone again -->
      <div class="scan-success-banner" *ngIf="scanComplete">
        <div class="success-icon">✓</div>
        <div class="success-info">
          <strong>{{ currentCvFile }}</strong>
          <span>CV przeanalizowane pomyślnie</span>
        </div>
        <button type="button" class="remove-link" (click)="removeCv()">Usuń</button>
      </div>

    </section>

  </div>

  <!-- Technology and experience filter form - the same FiltersFormComponent as on /home and /offers,
       here configured with only seniority and technologies (no location, salary or roles) -->
  <app-filters-form
    class="animate-up delay-1"
    [initialFilters]="savedFilters"
    [showApplyButton]="false"
    summaryHeading="Technologie i doświadczenie"
    [showSummaryHeader]="true"
    [showLocation]="false"
    [showWorkMode]="false"
    [showSalary]="false"
    [showRoles]="false"
    [showSites]="false"
    [showExpLevel]="true"
    [showTechnologies]="true"
    [singleExpLevelSelection]="true"
    (filtersChange)="onFiltersChange($event)">
  </app-filters-form>

  <!-- Profile load error - a 404 is a normal state for a new user and does not set loadError -->
  <div *ngIf="loadError" class="profile-feedback animate-up">
    <div class="profile-feedback-box error">{{ loadError }}</div>
  </div>

  <!-- Post-save messages: saveError (PUT failure) or saveSuccess (success, disappears after 3s).
       saveSuccessTimer in profile.component.ts clears the success message automatically -->
  <div *ngIf="saveError || saveSuccess" class="profile-feedback animate-up">
    <div *ngIf="saveError" class="profile-feedback-box error">{{ saveError }}</div>
    <div *ngIf="saveSuccess" class="profile-feedback-box success">{{ saveSuccess }}</div>
  </div>

  <!-- Action buttons - actions-row-with-feedback reduces the margin when a feedback banner is visible -->
  <div class="actions-row animate-up delay-2" [class.actions-row-with-feedback]="saveError || saveSuccess">

    <!-- "Save changes" button - sends PUT /v1/users/me/profile via onSave().
         Disabled during an in-progress save (isSaving = true) -->
    <button type="button" class="submit-button" (click)="onSave()" [disabled]="isSaving">
      <ng-container *ngIf="!isSaving">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Zapisz zmiany
      </ng-container>
      <ng-container *ngIf="isSaving">Zapisywanie…</ng-container>
    </button>

    <!-- Cancel - returns to the home page via Angular Router without a reload -->
    <button type="button" class="secondary-button" routerLink="/">Anuluj</button>
  </div>

</div>

<!-- Page footer -->
<app-footer></app-footer>
