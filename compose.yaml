services:
  message-broker:
    image: redis:8.4-alpine
    container_name: message-broker
    env_file:
      - .env
    entrypoint: ["redis-server", "--port", "${REDIS_PORT}", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - app-network
    restart: unless-stopped

  database:
    image: postgres:18-alpine
    container_name: database
    env_file:
      - .env
    volumes:
      - db-data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  migrations:
    build: ./backend
    container_name: migrations
    env_file:
      - .env
    entrypoint: ["uv", "run", "alembic", "upgrade", "head"]
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    container_name: backend
    extra_hosts:
      - "localhost:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/docs').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    container_name: keycloak-dev
    command: start-dev --import-realm
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - app-network
    volumes:
      # Brak trwalego wolumenu danych Keycloak (dev): start-dev --import-realm importuje realm
      # tylko gdy NIE istnieje. Bez persystencji realm jest re-importowany przy kazdym starcie,
      # wiec zmiany w keyCloak/import/it-hell-realm.json (np. redirect URI) dzialaja po restarcie.
      - ./keyCloak/themes:/opt/keycloak/themes
      - ./keyCloak/import:/opt/keycloak/data/import:ro
    restart: unless-stopped

  worker:
    build: ./backend
    container_name: worker
    entrypoint: ["uv", "run", "python", "-m", "worker.main"]
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      message-broker:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    restart: unless-stopped

  scrapers:
    build: ./scrapers
    container_name: scrapers
    env_file:
      - .env
    volumes:
      - ./scrapers/logs:/app/logs
    networks:
      - app-network
    depends_on:
      - worker
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1 zamiast localhost - nginx nasluchuje tylko na IPv4 (listen 80),
      # a wget z "localhost" probuje najpierw IPv6 ::1 -> falszywe "unhealthy"
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s


volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge
